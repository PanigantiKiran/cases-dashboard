            background: white;

            display: grid;

            gap: 15px;
            margin: 30px 0;
        }
        .product-card {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .product-card:hover { border-color: #667eea; box-shadow: 0 5px 15px rgba(102,126,234,0.2); }
        .product-card.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        .product-name { font-weight: bold; margin-bottom: 5px; }
        .product-count { font-size: 0.9em; opacity: 0.8; }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.5); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats { text-align: center; margin: 20px 0; font-size: 1.2em; color: #667eea; font-weight: bold; }
    </style>

    // MAIN CODE
    let selectedProducts = new Set();
    const statusDiv = document.getElementById('status');
    const statsDiv = document.getElementById('stats');
    const productsDiv = document.getElementById('products');
    const viewBtn = document.getElementById('viewBtn');

    // Check if data loaded
    if (typeof casesData === 'undefined' || !casesData || casesData.length === 0) {
        statusDiv.className = 'status error';
        statusDiv.innerHTML = '<strong>ERROR:</strong> Data failed to load. casesData = ' + typeof casesData;
    } else {
        statusDiv.className = 'status success';
        statusDiv.innerHTML = '<strong>✓ Data Loaded Successfully!</strong><br>' + casesData.length + ' cases found';
        
        // Count products
        const productCounts = {};
        casesData.forEach(c => {
            productCounts[c.product] = (productCounts[c.product] || 0) + 1;
        });

        const sortedProducts = Object.entries(productCounts).sort((a, b) => b[1] - a[1]);
        
        statsDiv.innerHTML = 'Total Cases: ' + casesData.length + ' | Products: ' + sortedProducts.length;

        // Create product cards
        sortedProducts.forEach(([product, count]) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => toggleProduct(product, card);
            card.innerHTML = '<div class="product-name">' + product + '</div><div class="product-count">' + count + ' cases</div>';
            productsDiv.appendChild(card);
        });
    }

    function toggleProduct(product, card) {
        if (selectedProducts.has(product)) {
            selectedProducts.delete(product);
            card.classList.remove('selected');
        } else {
            selectedProducts.add(product);
            card.classList.add('selected');
        }
        viewBtn.disabled = selectedProducts.size === 0;
        statsDiv.innerHTML = 'Selected: ' + selectedProducts.size + ' products';
    }

    function viewDashboard() {
        if (selectedProducts.size === 0) {
            alert('Please select at least one product');
            return;
        }
        localStorage.setItem('selectedProducts', JSON.stringify([...selectedProducts]));
        
        // Filter cases
        const filtered = casesData.filter(c => selectedProducts.has(c.product));
        alert('Selected ' + selectedProducts.size + ' products with ' + filtered.length + ' cases.\\n\\nClick OK to view dashboard.');
        
        window.location.href = 'final-dashboard.html';
    }
