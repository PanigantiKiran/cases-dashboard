<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Products - May 2026 Cases</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .selection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .selection-header h2 {
            color: #333;
            font-size: 1.5em;
        }

        .select-buttons {
            display: flex;
            gap: 10px;
        }

        .select-buttons button {
            padding: 8px 15px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .select-buttons button:hover {
            background: #667eea;
            color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .product-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .product-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }

        .product-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .product-item.selected .product-checkbox {
            accent-color: white;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            font-size: 1em;
            margin-bottom: 5px;
        }

        .product-count {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #f8f9ff;
        }

        .selected-count {
            text-align: center;
            margin: 20px 0;
            font-size: 1.1em;
            color: #666;
        }

        .selected-count span {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 May 2026 Cases Dashboard</h1>
            <p>Select products to analyze</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalCases">134</div>
                <div class="stat-label">Total Cases</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalProducts">0</div>
                <div class="stat-label">Products</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="selectedCount">0</div>
                <div class="stat-label">Selected</div>
            </div>
        </div>

        <div class="selection-header">
            <h2>Select Products</h2>
            <div class="select-buttons">
                <button onclick="selectAll()">Select All</button>
                <button onclick="clearAll()">Clear All</button>
            </div>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <div class="selected-count">
            <span id="selectedText">No products selected</span>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="viewDashboard" onclick="viewDashboard()" disabled>
                View Dashboard →
            </button>
            <button class="btn btn-secondary" onclick="viewAllCases()">
                View All Cases
            </button>
        </div>
    </div>

    <script src="cases-data-embedded.js"></script>
    <script>
        // Debug logging
        console.log('=== SELECT PRODUCTS PAGE DEBUG ===');
        console.log('casesData exists:', typeof casesData !== 'undefined');
        console.log('casesData length:', typeof casesData !== 'undefined' ? casesData.length : 'UNDEFINED');

        if (typeof casesData === 'undefined') {
            alert('ERROR: Data file not loaded! Check browser console.');
            document.body.innerHTML = '<div style="color:red; padding:40px; text-align:center;"><h1>ERROR: Data Not Loaded</h1><p>Press F12 to see console</p></div>';
        }

        let selectedProducts = new Set();

        function loadProducts() {
            if (typeof casesData === 'undefined') {
                console.error('casesData is undefined in loadProducts()');
                return;
            }

            console.log('Loading products from', casesData.length, 'cases');

            const productCounts = {};
            casesData.forEach(c => {
                productCounts[c.product] = (productCounts[c.product] || 0) + 1;
            });

            console.log('Product counts:', productCounts);

            const sortedProducts = Object.entries(productCounts)
                .sort((a, b) => b[1] - a[1]);

            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            sortedProducts.forEach(([product, count]) => {
                const item = document.createElement('div');
                item.className = 'product-item';
                item.onclick = () => toggleProduct(product, item);

                item.innerHTML = `
                    <input type="checkbox" class="product-checkbox" id="prod-${product.replace(/\s+/g, '-')}">
                    <div class="product-info">
                        <div class="product-name">${product}</div>
                        <div class="product-count">${count} cases</div>
                    </div>
                `;

                grid.appendChild(item);
            });

            document.getElementById('totalProducts').textContent = sortedProducts.length;
            document.getElementById('totalCases').textContent = casesData.length;

            console.log('Products loaded:', sortedProducts.length);
            console.log('Grid children:', grid.children.length);

            if (grid.children.length === 0) {
                console.error('ERROR: No products were added to the grid!');
                grid.innerHTML = '<div style="padding: 40px; text-align: center; color: red;"><h2>ERROR: No products found</h2><p>Check console for details</p></div>';
            }
        }

        function toggleProduct(product, element) {
            if (selectedProducts.has(product)) {
                selectedProducts.delete(product);
                element.classList.remove('selected');
                element.querySelector('.product-checkbox').checked = false;
            } else {
                selectedProducts.add(product);
                element.classList.add('selected');
                element.querySelector('.product-checkbox').checked = true;
            }
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = selectedProducts.size;
            document.getElementById('selectedCount').textContent = count;

            const selectedText = document.getElementById('selectedText');
            if (count === 0) {
                selectedText.textContent = 'No products selected';
            } else if (count === 1) {
                selectedText.innerHTML = `<span>1</span> product selected`;
            } else {
                selectedText.innerHTML = `<span>${count}</span> products selected`;
            }

            document.getElementById('viewDashboard').disabled = count === 0;
        }

        function selectAll() {
            const productCounts = {};
            casesData.forEach(c => {
                productCounts[c.product] = (productCounts[c.product] || 0) + 1;
            });

            selectedProducts = new Set(Object.keys(productCounts));

            document.querySelectorAll('.product-item').forEach(item => {
                item.classList.add('selected');
                item.querySelector('.product-checkbox').checked = true;
            });

            updateSelectedCount();
        }

        function clearAll() {
            selectedProducts.clear();

            document.querySelectorAll('.product-item').forEach(item => {
                item.classList.remove('selected');
                item.querySelector('.product-checkbox').checked = false;
            });

            updateSelectedCount();
        }

        function viewDashboard() {
            if (selectedProducts.size === 0) {
                alert('Please select at least one product');
                return;
            }

            // Save selected products to localStorage
            localStorage.setItem('selectedProducts', JSON.stringify([...selectedProducts]));

            // Navigate to dashboard
            window.location.href = 'dashboard-filtered.html';
        }

        function viewAllCases() {
            localStorage.removeItem('selectedProducts');
            window.location.href = 'dashboard-filtered.html';
        }

        // Initialize
        loadProducts();
    </script>
</body>
</html>
